    .source-card { background: var(--bg-elevated); border: 2px solid var(--border); border-radius: 0.75rem; padding: 1.5rem; cursor: pointer; transition: all 0.15s; text-align: center; }
    .source-card:hover { border-color: #6366f1; background: rgba(79,70,229,0.08); }
    .source-card.selected { border-color: #6366f1; background: rgba(79,70,229,0.08); }
    .channel-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem 0.75rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.875rem; transition: all 0.15s; }
    .channel-row:hover { background: rgba(51,65,85,0.5); }
    .channel-row.selected { background: rgba(79,70,229,0.1); color: #a5b4fc; }    
    
    
    
    
    .back-link { color: #64748b; display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.875rem; cursor: pointer; border: none; background: none; padding: 0; }
    .back-link:hover { color: #f8fafc; }</style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen"
      x-data="scheduleStore()"
      x-init="init()">
  
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex-shrink-0 hidden md:flex md:flex-col">
      <div class="h-16 flex items-center px-6 border-b border-slate-800">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
          </div>
          <h1 class="text-lg font-bold text-white">IPTVrec</h1>
        </div>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-slate-200">Dashboard</a>
        <a href="/recordings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-slate-200">Grabaciones</a>
        <a href="/schedule" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-indigo-600/20 text-indigo-300">programacion</a>
        <a href="/wizard" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-slate-200">Nueva Grabacion</a>
        <a href="/settings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-slate-200">Ajustes</a>
      </nav>
    </aside>

    <main class="flex-1 overflow-y-auto md:pt-0 pt-14">
      <div class="p-4 md:p-6 lg:p-8 max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
          <div>
            <h2 class="text-2xl font-bold text-white">programacion</h2>
            <p class="text-slate-500 text-sm" x-text="entries.length + ' grabaciones programadas'"></p>
          </div>
          <a href="/wizard" class="btn-primary text-sm">+ Nueva</a>
        </div>

        <div class="card overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="bg-slate-900 text-slate-500 text-xs uppercase tracking-wider">
                  <th class="text-left py-3 px-4">Activada</th>
                  <th class="text-left py-3 px-4">Nombre</th>
                  <th class="text-left py-3 px-4">Fuente</th>
                  <th class="text-left py-3 px-4">Canal</th>
                  <th class="text-left py-3 px-4">Recurrencia</th>
                  <th class="text-left py-3 px-4">Duracion</th>
                  <th class="text-left py-3 px-4">YouTube</th>
                  <th class="text-right py-3 px-4">Acciones</th>
                </tr>
              </thead>
              <tbody>
                <template x-if="entries.length === 0">
                  <tr>
                    <td colspan="8" class="text-center py-8 text-slate-500">No hay grabaciones programadas. <a href="/wizard" class="text-indigo-400 hover:text-indigo-300">Crear una</a></td>
                  </tr>
                </template>
                <template x-for="(e, i) in entries" :key="e.id">
                  <tr class="border-t border-slate-700 hover:bg-slate-700/50">
                    <td class="py-3 px-4">
                      <button @click="toggleEnabled(e.id, !e.enabled)" class="relative w-10 h-5 rounded-full transition-colors" :class="e.enabled !== false ? 'bg-indigo-600' : 'bg-slate-600'">
                        <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition-transform" :class="e.enabled !== false ? 'translate-x-5' : 'translate-x-0'"></div>
                      </button>
                    </td>
                    <td class="py-3 px-4">
                      <span class="text-white font-medium" x-text="e.name || e.id"></span>
                    </td>
                    <td class="py-3 px-4">
                      <span class="badge-blue" x-text="e.source"></span>
                    </td>
                    <td class="py-3 px-4 text-slate-400" x-text="e.channel"></td>
                    <td class="py-3 px-4">
                      <span class="text-slate-300" x-text="recurrenceText(e)"></span>
                      <br>
                      <span class="text-xs text-slate-500" x-text="nextFireText(e)"></span>
                    </td>
                    <td class="py-3 px-4 text-slate-400 font-mono" x-text="formatDuration(e.duration)"></td>
                    <td class="py-3 px-4">
                      <template x-if="e.youtube?.upload">
                        <span class="text-red-400 text-xs">Si</span>
                      </template>
                      <template x-if="!e.youtube?.upload">
                        <span class="text-slate-600 text-xs">No</span>
                      </template>
                    </td>
                    <td class="py-3 px-4 text-right">
                      <div class="flex justify-end gap-1">
                        <button @click="editEntry(e)" class="p-1.5 rounded text-slate-500 hover:text-indigo-400 hover:bg-slate-700" title="Editar">
                          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        </button>
                        <button @click="deleteEntry(e.id)" class="p-1.5 rounded text-slate-500 hover:text-red-400 hover:bg-slate-700" title="Eliminar">
                          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                      </div>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    function scheduleStore() {
      return {
        entries: [],
        init() { this.fetch(); },
        async fetch() {
          try {
            const res = await fetch('/api/schedule').then(r => r.json());
            this.entries = res.entries || [];
          } catch (err) { console.error(err); }
        },
        async toggleEnabled(id, enabled) {
          const action = enabled ? 'enable' : 'disable';
          try {
            await fetch(`/api/schedule/${id}/${action}`, { method: 'POST' });
            this.fetch();
          } catch (err) { console.error(err); }
        },
        async deleteEntry(id) {
          if (!confirm('Eliminar grabaci\u00f3n programada "' + id + '"?')) return;
          try {
            await fetch(`/api/schedule/${id}`, { method: 'DELETE' });
            this.fetch();
          } catch (err) { console.error(err); }
        },
        editEntry(e) {
          window.location.href = '/wizard';
        },
        recurrenceText(e) {
          const r = e.recurrence || {};
          if (r.type === 'once') return r.date + ' ' + r.time;
          if (r.type === 'daily') return 'Diario a las ' + r.time;
          if (r.type === 'weekly') return 'Semanal (' + (r.days || []).join(', ') + ') ' + r.time;
          return r.type || '?';
        },
        nextFireText(e) {
          return '';
        },
        formatDuration(s) {
          if (!s) return '0m';
          const h = Math.floor(s / 3600);
          const m = Math.floor((s % 3600) / 60);
          if (h) return h + 'h ' + m + 'm';
          return m + 'm';
        }
      }
    }
  </script>
</body>
</html>
