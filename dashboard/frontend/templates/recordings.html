    .source-card { background: var(--bg-elevated); border: 2px solid var(--border); border-radius: 0.75rem; padding: 1.5rem; cursor: pointer; transition: all 0.15s; text-align: center; }
    .source-card:hover { border-color: #6366f1; background: rgba(79,70,229,0.08); }
    .source-card.selected { border-color: #6366f1; background: rgba(79,70,229,0.08); }
    .channel-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem 0.75rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.875rem; transition: all 0.15s; }
    .channel-row:hover { background: rgba(51,65,85,0.5); }
    .channel-row.selected { background: rgba(79,70,229,0.1); color: #a5b4fc; }    
    
    
    
    
    .back-link { color: #64748b; display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.875rem; cursor: pointer; border: none; background: none; padding: 0; }
    .back-link:hover { color: #f8fafc; }</style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen"
      x-data="recordingsStore()"
      x-init="init()">
  
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex-shrink-0 hidden md:flex md:flex-col">
      <div class="h-16 flex items-center px-6 border-b border-slate-800">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
          </div>
          <h1 class="text-lg font-bold text-white">IPTVrec</h1>
        </div>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-slate-200"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>Dashboard</a>
        <a href="/recordings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-indigo-600/20 text-indigo-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>Grabaciones</a>
        <a href="/schedule" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-slate-200"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>programacion</a>
        <a href="/wizard" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-slate-200"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>Nueva Grabacion</a>
        <a href="/settings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-slate-200"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>Ajustes</a>
      </nav>
      <div class="p-4 border-t border-slate-800 text-xs text-slate-500">
        <div class="w-2 h-2 rounded-full inline-block" :class="daemonRunning ? 'bg-emerald-400' : 'bg-red-400'"></div>
        <span x-text="daemonRunning ? 'Demonio activo' : 'Demonio detenido'"></span>
      </div>
    </aside>
    <div class="md:hidden fixed top-0 left-0 right-0 z-40 bg-slate-900 border-b border-slate-800 px-4 h-14 flex items-center">
      <button @click="mobileMenu = !mobileMenu" class="text-slate-400 hover:text-white p-2 mr-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </button>
      <span class="font-bold text-white">Grabaciones</span>
    </div>
    <div x-show="mobileMenu" @click="mobileMenu = false" class="md:hidden fixed inset-0 z-30 bg-black/50" style="display: none;"></div>

    <main class="flex-1 overflow-y-auto md:pt-0 pt-14">
      <div class="p-4 md:p-6 lg:p-8 max-w-7xl mx-auto">
        
        <div class="flex justify-between items-center mb-6">
          <div>
            <h2 class="text-2xl font-bold text-white">Grabaciones</h2>
            <p class="text-slate-500 text-sm" x-text="'Total: ' + (active.length + recent.length)"></p>
          </div>
          <a href="/wizard" class="btn-primary text-sm">Nueva grabacion</a>
        </div>

        <!-- Active recordings -->
        <div class="card mb-6">
          <div class="px-5 py-4 border-b border-slate-700">
            <h3 class="text-lg font-semibold text-white">Activas</h3>
          </div>
          <div class="p-5">
            <template x-if="active.length === 0">
              <div class="text-center py-6 text-slate-500 text-sm">No hay grabaciones activas</div>
            </template>
            <div class="overflow-x-auto">
              <table class="w-full text-sm" x-show="active.length > 0">
                <thead>
                  <tr class="text-slate-500 text-xs uppercase tracking-wider">
                    <th class="text-left py-2 pr-4">Nombre</th>
                    <th class="text-left py-2 pr-4">Fuente</th>
                    <th class="text-left py-2 pr-4">Estado</th>
                    <th class="text-left py-2 pr-4">Progreso</th>
                    <th class="text-right py-2 pr-4">Tamano</th>
                    <th class="text-right py-2">Acciones</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="r in active" :key="r.job_id">
                    <tr class="border-t border-slate-700 hover:bg-slate-700/50">
                      <td class="py-3 pr-4">
                        <span class="text-white font-medium" x-text="r.name"></span>
                        <br>
                        <span class="text-slate-500 text-xs" x-text="r.channel"></span>
                      </td>
                      <td class="py-3 pr-4 text-slate-400" x-text="r.source"></td>
                      <td class="py-3 pr-4">
                        <span :class="r.status === 'recording' ? 'badge-green' : 'badge-blue'" x-text="r.status"></span>
                      </td>
                      <td class="py-3 pr-4">
                        <div class="flex items-center gap-2">
                          <div class="flex-1 h-1.5 bg-slate-700 rounded-full">
                            <div class="h-full bg-indigo-500 rounded-full" :style="'width:' + progressPct(r) + '%'"></div>
                          </div>
                          <span class="text-xs text-slate-500 font-mono" x-text="formatTime(r.elapsed_s) + ' / ' + formatTime(r.elapsed_s + r.remaining_s)"></span>
                        </div>
                      </td>
                      <td class="py-3 pr-4 text-right font-mono text-slate-400" x-text="formatBytes(r.current_size_bytes)"></td>
                      <td class="py-3 text-right">
                        <div class="flex justify-end gap-1">
                          <button @click="openLog(r.job_id)" class="p-1.5 rounded text-slate-500 hover:text-indigo-400 hover:bg-slate-700" title="Ver log">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                          </button>
                          <button @click="stopRecording(r.job_id)" class="p-1.5 rounded text-slate-500 hover:text-red-400 hover:bg-slate-700" title="Detener">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>
                          </button>
                        </div>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Recent recordings -->
        <div class="card">
          <div class="px-5 py-4 border-b border-slate-700">
            <h3 class="text-lg font-semibold text-white">Recientes</h3>
          </div>
          <div class="p-5">
            <template x-if="recent.length === 0">
              <div class="text-center py-6 text-slate-500 text-sm">No hay grabaciones recientes</div>
            </template>
            <div class="overflow-x-auto">
              <table class="w-full text-sm" x-show="recent.length > 0">
                <thead>
                  <tr class="text-slate-500 text-xs uppercase tracking-wider">
                    <th class="text-left py-2 pr-4">Nombre</th>
                    <th class="text-left py-2 pr-4">Estado</th>
                    <th class="text-left py-2 pr-4">Archivo</th>
                    <th class="text-right py-2 pr-4">Tamano</th>
                    <th class="text-right py-2">Log</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="r in recent" :key="r.job_id">
                    <tr class="border-t border-slate-700 hover:bg-slate-700/50">
                      <td class="py-3 pr-4">
                        <span class="text-white font-medium" x-text="r.name"></span>
                        <br>
                        <span class="text-slate-500 text-xs" x-text="r.source + '/' + r.channel"></span>
                      </td>
                      <td class="py-3 pr-4">
                        <span :class="r.status === 'success' ? 'badge-green' : 'badge-red'" x-text="r.status === 'success' ? 'Correcto' : 'Fallido'"></span>
                      </td>
                      <td class="py-3 pr-4">
                        <span class="text-slate-400 text-xs break-all" x-text="r.final_path || r.last_error"></span>
                        <template x-if="r.youtube_url">
                          <a :href="r.youtube_url" target="_blank" class="text-red-400 hover:text-red-300 ml-1 inline-block text-xs">YouTube</a>
                        </template>
                      </td>
                      <td class="py-3 pr-4 text-right font-mono text-slate-400" x-text="formatBytes(r.current_size_bytes || r.bytes)"></td>
                      <td class="py-3 text-right">
                        <button @click="openLog(r.job_id)" class="p-1.5 rounded text-slate-500 hover:text-indigo-400 hover:bg-slate-700" title="Ver log">
                          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        </button>
                      </td>
                    </tr>

  <!-- Log modal -->
  <div x-show="logModal" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display: none;">
    <div class="fixed inset-0 bg-black/60" @click="closeLog()"></div>
    <div class="relative bg-slate-900 border border-slate-700 rounded-xl shadow-2xl w-full max-w-4xl max-h-[80vh] flex flex-col">
      <div class="px-5 py-4 border-b border-slate-700 flex items-center justify-between">
        <div>
          <h3 class="text-lg font-semibold text-white" x-text="'Log: ' + logJobId"></h3>
          <p class="text-xs text-slate-500">
            <span x-text="logLines.length + ' lineas cargadas'"></span>
            <span x-show="logWsConnected" class="text-emerald-400 ml-2">&#9679; En vivo</span>
          </p>
        </div>
        <div class="flex items-center gap-2">
          <button @click="toggleLogLive()" class="btn-secondary text-xs py-1.5 px-3" x-text="logLive ? 'Pausar' : 'En vivo'"></button>
          <button @click="closeLog()" class="text-slate-500 hover:text-white p-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto p-2 bg-slate-950" id="log-container" x-ref="logContainer">
        <template x-for="line in logLines" :key="line.line">
          <div :class="'log-line log-' + (line.level || 'INFO')" x-text="line.raw"></div>
        </template>
        <div x-show="logLoading" class="text-center py-4 text-slate-500 text-sm">Cargando...</div>
      </div>
    </div>
  </div>

  <script>
    function recordingsStore() {
      return {
        mobileMenu: false,
        daemonRunning: false,
        active: [],
        recent: [],
        // Log
        logModal: false,
        logJobId: '',
        logLines: [],
        logLive: true,
        logWsConnected: false,
        logLoading: false,
        logWs: null,
        logAutoScroll: true,
        
        async init() {
          this.fetchData();
          setInterval(() => this.fetchData(), 15000);
          // Check URL for log param
          const params = new URLSearchParams(window.location.search);
          const logId = params.get('log');
          if (logId) {
            setTimeout(() => this.openLog(logId), 500);
          }
        },
        async fetchData() {
          try {
            const [daemonRes, recRes] = await Promise.all([
              fetch('/api/daemon/status').then(r => r.json()),
              fetch('/api/recordings').then(r => r.json())
            ]);
            this.daemonRunning = daemonRes.running;
            this.active = recRes.active || [];
            this.recent = recRes.recent || [];
          } catch (err) { console.error(err); }
        },
        async openLog(jobId) {
          this.logJobId = jobId;
          this.logModal = true;
          this.logLines = [];
          this.logLoading = true;
          this.logLive = true;
          
          // Load existing lines
          try {
            const res = await fetch(`/api/recordings/${jobId}/log?offset=0&limit=1000`).then(r => r.json());
            this.logLines = res.lines || [];
          } catch (err) { console.error(err); }
          this.logLoading = false;
          
          // Connect WebSocket for live streaming
          this.connectLogWs();
        },
        connectLogWs() {
          if (this.logWs) this.logWs.close();
          const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
          const wsUrl = `${protocol}//${window.location.host}/ws/logs/${this.logJobId}`;
          try {
            this.logWs = new WebSocket(wsUrl);
            this.logWs.onopen = () => { this.logWsConnected = true; };
            this.logWs.onmessage = (event) => {
              if (!this.logLive) return;
              const data = JSON.parse(event.data);
              if (data.type === 'line') {
                const lineNum = this.logLines.length;
                const parsed = this.parseLogLine(data.data, lineNum);
                this.logLines.push(parsed);
                // Scroll to bottom
                this.$nextTick(() => {
                  const container = this.$refs.logContainer;
                  if (container) container.scrollTop = container.scrollHeight;
                });
              }
            };
            this.logWs.onclose = () => { this.logWsConnected = false; };
            this.logWs.onerror = () => { this.logWsConnected = false; };
          } catch (err) { console.error(err); }
        },
        parseLogLine(line, lineNum) {
          const m = line.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}(?:,\d+)?)\s+-\s+(\w+)\s+-\s+(.*)$/);
          if (m) return { line: lineNum, timestamp: m[1], level: m[2], message: m[3], raw: line };
          return { line: lineNum, timestamp: '', level: '', message: line, raw: line };
        },
        toggleLogLive() {
          this.logLive = !this.logLive;
          if (this.logLive && !this.logWsConnected) this.connectLogWs();
        },
        closeLog() {
          this.logModal = false;
          if (this.logWs) { this.logWs.close(); this.logWs = null; }
        },
        async stopRecording(jobId) {
          if (!confirm('Detener grabaci\u00f3n?')) return;
          try {
            await fetch(`/api/recordings/${jobId}/stop`, { method: 'POST' });
            this.fetchData();
          } catch (err) { console.error(err); }
        },
        progressPct(r) {
          const total = (r.elapsed_s || 0) + (r.remaining_s || 0);
          if (total <= 0) return 0;
          return Math.min(100, Math.round((r.elapsed_s / total) * 100));
        },
        formatTime(s) {
          if (!s || s <= 0) return '00:00:00';
          return String(Math.floor(s / 3600)).padStart(2,'0') + ':' + String(Math.floor((s % 3600) / 60)).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
        },
        formatBytes(b) {
          if (!b || b <= 0) return '0 B';
          const u = ['B','KB','MB','GB','TB']; let i = 0; let v = b;
          while (v >= 1024 && i < u.length-1) { v /= 1024; i++; }
          return v.toFixed(1) + ' ' + u[i];
        }
      }
    }
  </script>
</body>
